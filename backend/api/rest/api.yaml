openapi: 3.0.0
info:
  version: 1.0.0
  title: Token Management API
  description: API for managing and filtering tokens
servers:
  - url: http://localhost:8080
    description: Development server

paths:
  /tokens:
    post:
      summary: Get filtered tokens
      description: Returns list of tokens filtered by search criteria
      operationId: getTokens
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FilterProps'
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Token'
        '400':
          description: Invalid input
        '500':
          description: Internal server error

  /tokens/market:
    post:
      summary: Get market tokens
      description: Returns list of tokens available on marketplace
      operationId: getMarketTokens
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FilterProps'
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Token'

  /tokens/upload:
    post:
      summary: Upload new token
      description: Create new token with metadata and associated file
      operationId: uploadToken
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                name:
                  type: string
                icon:
                  type: string
                file:
                  type: string
                  format: binary
              required:
                - name
                - file
      responses:
        '201':
          description: Token created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Token'
        '400':
          description: Invalid input
        '500':
          description: Internal server error

components:
  schemas:
    Token:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: string
          example: "1"
          description: Unique token identifier
        name:
          type: string
          example: "sleep_2024_12"
          description: Token name
        icon:
          type: string
          example: "hotel"
          description: Icon representing token type
          nullable: true
        onMarket:
          type: boolean
          example: true
          description: Is token available on marketplace
        fileUrl:
          type: string
          format: uri
          example: "http://example.com/tokens/1.json"
          description: URL to token data file

    FilterProps:
      type: object
      properties:
        search:
          type: string
          nullable: true
          example: "sleep"
          description: Search string to filter tokens by name
        sort:
          type: string
          enum: [asc, desc]
          nullable: true
          example: "asc"
          description: Sort order (ascending or descending)
        onMarket:
          type: boolean
          nullable: true
          example: true
          description: Filter tokens available on marketplace